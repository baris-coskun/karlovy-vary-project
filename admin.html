<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Karlovy Vary – Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <style>
      .admin-wrapper {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .admin-title {
        font-size: 26px;
        font-weight: 700;
        color: #1a3a4a;
      }
      .admin-subtitle {
        color: #888;
        font-size: 13px;
      }
      .admin-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 2px solid #eee;
      }
      .admin-tab {
        padding: 10px 20px;
        cursor: pointer;
        font-weight: 600;
        color: #888;
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
        font-size: 14px;
      }
      .admin-tab.active {
        color: #1a6a8a;
        border-bottom-color: #1a6a8a;
      }
      .tab-content { display: none; }
      .tab-content.active { display: block; }

      /* Stats */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 20px 24px;
        text-align: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      }
      .stat-number {
        font-size: 36px;
        font-weight: 800;
        color: #1a6a8a;
      }
      .stat-label {
        font-size: 13px;
        color: #888;
        margin-top: 4px;
      }

      /* Table */
      .admin-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
      .admin-table thead {
        background: #1a6a8a;
        color: white;
      }
      .admin-table thead th {
        padding: 12px 14px;
        text-align: left;
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .admin-table tbody tr {
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.15s;
      }
      .admin-table tbody tr:hover {
        background: #f8fbfc;
      }
      .admin-table tbody td {
        padding: 11px 14px;
        color: #444;
        vertical-align: top;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        text-transform: capitalize;
        background: #e8f4f8;
        color: #1a6a8a;
      }
      .empty-state {
        text-align: center;
        padding: 40px;
        color: #aaa;
        background: #fafafa;
        border-radius: 8px;
        border: 1px dashed #ddd;
      }
      .logout-btn {
        background: none;
        border: 1px solid #c00;
        color: #c00;
        padding: 7px 16px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .logout-btn:hover { background: #c00; color: white; }

      #loading {
        text-align: center;
        padding: 60px;
        color: #aaa;
      }
      .not-logged {
        text-align: center;
        padding: 60px;
        color: #666;
      }
      .not-logged a { color: #1a6a8a; font-weight: 600; }
      .msg-body {
        max-width: 260px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #555;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="teaching-notice">
        This project was created by students and is intended for educational purposes only.
      </div>
      <div class="navbar">
        <div class="logo">KARLOVY VARY</div>
        <ul class="nav-links">
          <li><a href="index.html">About</a></li>
          <li><a href="landmarks.html">Landmarks</a></li>
          <li><a href="culture.html">Culture</a></li>
          <li><a href="reservation.html">Reservation</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </div>
    </header>

    <div class="admin-wrapper">
      <div id="loading">Loading admin panel...</div>
      <div id="main" style="display:none"></div>
    </div>

    <footer>Copyright 2025 - Semestral Project Group 13</footer>

    <script>
      const API = "http://localhost:5000/api";

      async function init() {
        const meRes = await fetch(`${API}/auth/me`, { credentials: "include" });
        const me    = await meRes.json();

        document.getElementById("loading").style.display = "none";
        const main = document.getElementById("main");
        main.style.display = "block";

        if (!me.loggedIn) {
          main.innerHTML = `
            <div class="not-logged">
              <h2>Access Denied</h2>
              <p>You must be logged in to view the admin panel.</p>
              <a href="login.html">→ Go to Login</a>
            </div>`;
          return;
        }

        // Fetch data
        const [resData, msgData] = await Promise.all([
          fetch(`${API}/admin/reservations`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API}/admin/messages`,     { credentials: "include" }).then(r => r.json()),
        ]);

        const reservations = resData.reservations || [];
        const messages     = msgData.messages     || [];

        // Header
        main.innerHTML = `
          <div class="admin-header">
            <div>
              <div class="admin-title">⚙️ Admin Panel</div>
              <div class="admin-subtitle">Logged in as: <strong>${me.username}</strong></div>
            </div>
            <button class="logout-btn" id="logout-btn">Log out</button>
          </div>

          <!-- Stats -->
          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-number">${reservations.length}</div>
              <div class="stat-label">Total Reservations</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${messages.length}</div>
              <div class="stat-label">Contact Messages</div>
            </div>
            <div class="stat-card">
              <div class="stat-number">${new Set(reservations.map(r => r.email)).size}</div>
              <div class="stat-label">Unique Visitors</div>
            </div>
          </div>

          <!-- Tabs -->
          <div class="admin-tabs">
            <div class="admin-tab active" data-tab="reservations-tab">📅 Reservations (${reservations.length})</div>
            <div class="admin-tab" data-tab="messages-tab">✉️ Messages (${messages.length})</div>
          </div>

          <!-- Reservations Tab -->
          <div class="tab-content active" id="reservations-tab">
            ${reservations.length === 0
              ? '<div class="empty-state">No reservation requests yet.</div>'
              : `<table class="admin-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Arrival</th>
                      <th>Departure</th>
                      <th>Guests</th>
                      <th>Type</th>
                      <th>User</th>
                      <th>Submitted</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${reservations.map(r => `
                      <tr>
                        <td>${r.id}</td>
                        <td>${escHtml(r.full_name)}</td>
                        <td>${escHtml(r.email)}</td>
                        <td>${r.arrival}</td>
                        <td>${r.departure}</td>
                        <td>${r.guests}</td>
                        <td><span class="badge">${r.type}</span></td>
                        <td>${r.username ? escHtml(r.username) : '<span style="color:#ccc">guest</span>'}</td>
                        <td>${new Date(r.submitted_at).toLocaleDateString()}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>`
            }
          </div>

          <!-- Messages Tab -->
          <div class="tab-content" id="messages-tab">
            ${messages.length === 0
              ? '<div class="empty-state">No contact messages yet.</div>'
              : `<table class="admin-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Name</th>
                      <th>Subject</th>
                      <th>Message</th>
                      <th>Received</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${messages.map(m => `
                      <tr>
                        <td>${m.id}</td>
                        <td>${escHtml(m.name)}</td>
                        <td>${escHtml(m.subject)}</td>
                        <td><div class="msg-body">${escHtml(m.message)}</div></td>
                        <td>${new Date(m.submitted_at).toLocaleDateString()}</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>`
            }
          </div>
        `;

        // Tab switching
        document.querySelectorAll(".admin-tab").forEach(tab => {
          tab.addEventListener("click", () => {
            document.querySelectorAll(".admin-tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            tab.classList.add("active");
            document.getElementById(tab.dataset.tab).classList.add("active");
          });
        });

        // Logout
        document.getElementById("logout-btn").addEventListener("click", async () => {
          await fetch(`${API}/auth/logout`, { method: "POST", credentials: "include" });
          window.location.href = "login.html";
        });
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      init().catch(() => {
        document.getElementById("loading").textContent = "Failed to load. Is the backend server running?";
      });
    </script>
  </body>
</html>
