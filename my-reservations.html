<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Karlovy Vary – My Reservations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/main.css" />
    <style>
      .page-wrapper {
        max-width: 900px;
        margin: 50px auto;
        padding: 0 20px;
      }
      .page-heading {
        font-size: 26px;
        font-weight: 700;
        color: #1a3a4a;
        margin-bottom: 6px;
      }
      .page-subtext {
        color: #888;
        font-size: 14px;
        margin-bottom: 30px;
      }
      .no-reservations {
        background: #f8f9fa;
        border: 1px dashed #ccc;
        border-radius: 8px;
        padding: 40px;
        text-align: center;
        color: #888;
      }
      .no-reservations a {
        color: #1a6a8a;
        font-weight: 600;
        text-decoration: none;
      }
      .reservation-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 10px;
        padding: 22px 26px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
      .res-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 14px;
      }
      .res-card-title {
        font-size: 17px;
        font-weight: 700;
        color: #1a3a4a;
      }
      .res-badge {
        background: #e8f4f8;
        color: #1a6a8a;
        border-radius: 20px;
        padding: 3px 12px;
        font-size: 12px;
        font-weight: 600;
        text-transform: capitalize;
      }
      .res-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        font-size: 14px;
      }
      .res-field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
      }
      .res-field span {
        color: #333;
        font-weight: 500;
      }
      .res-notes {
        margin-top: 12px;
        font-size: 13px;
        color: #666;
        background: #fafafa;
        border-left: 3px solid #1a6a8a;
        padding: 8px 12px;
        border-radius: 0 5px 5px 0;
      }
      .res-submitted {
        margin-top: 10px;
        font-size: 12px;
        color: #bbb;
        text-align: right;
      }
      .not-logged {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }
      .not-logged a {
        color: #1a6a8a;
        font-weight: 600;
        text-decoration: none;
      }
      .user-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #e8f4f8;
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 24px;
        font-size: 14px;
        color: #1a6a8a;
        font-weight: 600;
      }
      .logout-btn {
        background: none;
        border: 1px solid #1a6a8a;
        color: #1a6a8a;
        padding: 5px 14px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .logout-btn:hover {
        background: #1a6a8a;
        color: white;
      }
      #loading {
        text-align: center;
        padding: 40px;
        color: #aaa;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="teaching-notice">
        This project was created by students and is intended for educational purposes only.
      </div>
      <div class="navbar">
        <div class="logo">KARLOVY VARY</div>
        <ul class="nav-links">
          <li><a href="index.html">About</a></li>
          <li><a href="landmarks.html">Landmarks</a></li>
          <li><a href="culture.html">Culture</a></li>
          <li><a href="reservation.html">Reservation</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </div>
    </header>

    <div class="page-wrapper">
      <div id="loading">Loading...</div>
      <div id="content" style="display:none"></div>
    </div>

    <footer>Copyright 2025 - Semestral Project Group 13</footer>

    <script>
      const API = "http://localhost:5000/api";

      async function init() {
        const meRes  = await fetch(`${API}/auth/me`, { credentials: "include" });
        const me     = await meRes.json();
        const content = document.getElementById("content");
        document.getElementById("loading").style.display = "none";
        content.style.display = "block";

        if (!me.loggedIn) {
          content.innerHTML = `
            <div class="not-logged">
              <h2>Please log in</h2>
              <p>You need to be logged in to view your reservations.</p>
              <a href="login.html">→ Go to Login</a>
            </div>`;
          return;
        }

        // Build user bar
        const userBar = document.createElement("div");
        userBar.className = "user-bar";
        userBar.innerHTML = `
          <span>👤 Logged in as: <strong>${me.username}</strong></span>
          <button class="logout-btn" id="logout-btn">Log out</button>
        `;
        content.appendChild(userBar);

        document.getElementById("logout-btn").addEventListener("click", async () => {
          await fetch(`${API}/auth/logout`, { method: "POST", credentials: "include" });
          window.location.href = "login.html";
        });

        // Heading
        const heading = document.createElement("div");
        heading.innerHTML = `
          <div class="page-heading">My Reservations</div>
          <div class="page-subtext">All reservation requests you have submitted.</div>
        `;
        content.appendChild(heading);

        // Fetch reservations
        const resRes  = await fetch(`${API}/reservations/my`, { credentials: "include" });
        const resData = await resRes.json();

        if (!resData.reservations || resData.reservations.length === 0) {
          const empty = document.createElement("div");
          empty.className = "no-reservations";
          empty.innerHTML = `
            <p style="font-size:18px; margin-bottom:10px;">No reservations yet.</p>
            <p>Make your first reservation request <a href="reservation.html">here</a>.</p>
          `;
          content.appendChild(empty);
          return;
        }

        resData.reservations.forEach(r => {
          const card = document.createElement("div");
          card.className = "reservation-card";

          const nights = Math.round(
            (new Date(r.departure) - new Date(r.arrival)) / (1000 * 60 * 60 * 24)
          );

          card.innerHTML = `
            <div class="res-card-header">
              <div class="res-card-title">📅 ${r.arrival} → ${r.departure}</div>
              <span class="res-badge">${r.type}</span>
            </div>
            <div class="res-grid">
              <div class="res-field">
                <label>Full Name</label>
                <span>${r.full_name}</span>
              </div>
              <div class="res-field">
                <label>Email</label>
                <span>${r.email}</span>
              </div>
              <div class="res-field">
                <label>Guests</label>
                <span>${r.guests} guest${r.guests > 1 ? "s" : ""}</span>
              </div>
              <div class="res-field">
                <label>Duration</label>
                <span>${nights} night${nights !== 1 ? "s" : ""}</span>
              </div>
            </div>
            ${r.notes ? `<div class="res-notes">📝 ${r.notes}</div>` : ""}
            <div class="res-submitted">Submitted: ${new Date(r.submitted_at).toLocaleString()}</div>
          `;
          content.appendChild(card);
        });
      }

      init().catch(err => {
        document.getElementById("loading").textContent = "Failed to load. Is the server running?";
      });
    </script>
  </body>
</html>
